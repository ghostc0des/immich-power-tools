version: '3.8'

services:
  immich_power_tools:
    container_name: immich_power_tools
    image: ghcr.io/immich-power-tools/immich-power-tools:latest
    ports:
      - "3000:3000"
    volumes:
      - immich-power-tools-data:/app/data
    env_file:
      - .env
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  immich-power-tools-data:
